name: terraform-plan

on:
  pull_request:
    paths:
      - "envs/**"
      - "modules/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  id-token: write # required to fetch the OIDC token
  contents: read
  pull-requests: write

jobs:
  plan:
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]

    runs-on: ubuntu-latest
    # Declaring `environment` here is what puts `environment:<name>` in
    # the OIDC token's `sub` claim - it's what the IAM trust policy in
    # modules/oidc-role matches against. It also means a GitHub
    # Environment protection rule on prod (required reviewers) gates
    # the prod plan too, not just the apply. Split into separate
    # plan/apply roles if you want prod plans visible without approval.
    environment: ${{ matrix.environment }}

    defaults:
      run:
        working-directory: envs/${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }} # e.g. arn:aws:iam::<account>:role/gitops-aws-oidc-<env>-gha
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-plan-${{ matrix.environment }}-${{ github.run_id }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="deployed_commit=${{ github.sha }}" \
            -input=false \
            -no-color \
            -out=tfplan
          terraform show -no-color tfplan > plan.txt
          terraform show -json tfplan > plan.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Plan risk review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pip install -r "${{ github.workspace }}/agents/plan-reviewer/requirements.txt"
          python "${{ github.workspace }}/agents/plan-reviewer/review_plan.py" \
            --env "${{ matrix.environment }}" \
            --plan-json plan.json \
            --plan-text plan.txt \
            --repo "${{ github.repository }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --anthropic-api-key "${{ secrets.ANTHROPIC_API_KEY }}"
